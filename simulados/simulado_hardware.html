<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardware</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#4CAF50,#2E7D32);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

#main-wrapper{
width:95%;
max-width:650px;
}

#quiz-container{
background:#fff;
padding:25px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
text-align:center;
animation:fadeIn .4s;
}

h2{
margin-bottom:10px;
color:#2E7D32;
}

#progress-text{
margin-bottom:10px;
font-size:14px;
color:#555;
}

#progress-bar{
width:100%;
height:10px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

#progress{
height:100%;
width:0%;
background:#4CAF50;
transition:.3s;
}

#question-container{
font-weight:bold;
margin-bottom:20px;
}

#options-container{
display:grid;
grid-template-columns:1fr;
gap:10px;
}

.option{
width:100%;
background:#4CAF50;
color:#fff;
padding:14px;
border:none;
border-radius:8px;
cursor:pointer;
transition:.3s;
font-size:16px;
}

.option:hover{
background:#388E3C;
transform:scale(1.02);
}

.option:disabled{
opacity:.7;
cursor:not-allowed;
}

.correct{
background:#2E7D32!important;
}

.wrong{
background:#C62828!important;
}

#result{
margin-top:15px;
font-weight:bold;
}

#restart-btn{
margin-top:20px;
padding:12px 20px;
border:none;
background:#2E7D32;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
display:none;
}

#restart-btn:hover{
background:#1B5E20;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

@media(min-width:600px){
#options-container{
grid-template-columns:1fr 1fr;
}
}

</style>
</head>

<body>

<div id="main-wrapper">

<div id="quiz-container">

<h2>Hardware</h2>

<div id="progress-text"></div>

<div id="progress-bar">
<div id="progress"></div>
</div>

<div id="question-container"></div>

<div id="options-container"></div>

<p id="result"></p>

<button id="restart-btn">Refazer Simulado</button>

</div>

</div>

<script>

const questions = [
{
question: "Qual componente é responsável por executar instruções e realizar o processamento principal do computador?",
options: ["a) Memória RAM", "b) Processador (CPU)", "c) Disco rígido", "d) Placa de rede"],
correctAnswer: 1
},
{
question: "Qual é a função principal da memória RAM em um computador?",
options: ["a) Armazenar dados permanentemente", "b) Executar cálculos matemáticos", "c) Armazenar temporariamente dados e programas em execução", "d) Conectar dispositivos externos"],
correctAnswer: 2
},
{
question: "Qual dispositivo é responsável pelo armazenamento permanente de arquivos e programas?",
options: ["a) Memória cache", "b) Registradores", "c) HD ou SSD", "d) BIOS"],
correctAnswer: 2
},
{
question: "Qual é a principal função da placa-mãe em um computador?",
options: ["a) Processar gráficos", "b) Conectar e permitir comunicação entre os componentes", "c) Armazenar o sistema operacional", "d) Controlar a internet"],
correctAnswer: 1
},
{
question: "Qual componente é responsável pelo processamento de gráficos e imagens em um computador?",
options: ["a) GPU ou placa de vídeo", "b) Memória RAM", "c) Chipset", "d) BIOS"],
correctAnswer: 0
},
{
question: "O que caracteriza um SSD em comparação a um HD tradicional?",
options: ["a) Utiliza discos magnéticos", "b) É mais lento no acesso aos dados", "c) Utiliza memória flash e possui maior velocidade", "d) Não permite armazenamento de arquivos"],
correctAnswer: 2
},
{
question: "Qual componente da placa-mãe controla a comunicação entre o processador, memória e periféricos?",
options: ["a) Chipset", "b) Fonte de alimentação", "c) Memória cache", "d) Cooler"],
correctAnswer: 0
},
{
question: "Qual é a função da fonte de alimentação em um computador?",
options: ["a) Armazenar dados", "b) Fornecer energia elétrica aos componentes", "c) Controlar o sistema operacional", "d) Processar gráficos"],
correctAnswer: 1
},
{
question: "Qual tipo de dispositivo é considerado periférico de entrada?",
options: ["a) Monitor", "b) Impressora", "c) Teclado", "d) Caixa de som"],
correctAnswer: 2
},
{
question: "Qual dispositivo é considerado periférico de saída?",
options: ["a) Mouse", "b) Teclado", "c) Scanner", "d) Monitor"],
correctAnswer: 3
},
{
question: "O que é BIOS em um computador?",
options: ["a) Sistema básico que inicializa o hardware", "b) Um tipo de memória RAM", "c) Um dispositivo de armazenamento", "d) Um software antivírus"],
correctAnswer: 0
},
{
question: "Qual é a função da memória cache no processador?",
options: ["a) Armazenar arquivos do usuário", "b) Acelerar o acesso a dados frequentemente utilizados", "c) Substituir a memória RAM", "d) Armazenar o sistema operacional"],
correctAnswer: 1
},
{
question: "O que é um barramento (bus) em um computador?",
options: ["a) Um dispositivo de armazenamento", "b) Um caminho de comunicação entre os componentes", "c) Um tipo de processador", "d) Um programa do sistema operacional"],
correctAnswer: 1
},
{
question: "Qual barramento é responsável por transportar dados entre os componentes do computador?",
options: ["a) Barramento de controle", "b) Barramento de endereços", "c) Barramento de dados", "d) Barramento gráfico"],
correctAnswer: 2
},
{
question: "Qual tecnologia permite utilizar vários discos para melhorar desempenho ou segurança de dados?",
options: ["a) RAID", "b) BIOS", "c) GPU", "d) HDMI"],
correctAnswer: 0
},
{
question: "Qual porta é amplamente utilizada para conectar periféricos como teclado, mouse e pen drives?",
options: ["a) HDMI", "b) USB", "c) VGA", "d) PS/2"],
correctAnswer: 1
},
{
question: "Qual porta é utilizada principalmente para transmissão de vídeo digital em alta definição?",
options: ["a) HDMI", "b) USB", "c) Ethernet", "d) Serial"],
correctAnswer: 0
},
{
question: "Qual componente é responsável por manter a temperatura adequada do processador?",
options: ["a) Cooler", "b) Chipset", "c) BIOS", "d) Barramento"],
correctAnswer: 0
},
{
question: "Qual dispositivo permite conectar o computador a uma rede de computadores ou à internet?",
options: ["a) Placa de rede", "b) Placa de vídeo", "c) Memória RAM", "d) Processador"],
correctAnswer: 0
},
{
question: "Qual é a principal diferença entre HD e SSD?",
options: ["a) O SSD utiliza partes mecânicas", "b) O HD é mais rápido que o SSD", "c) O SSD utiliza memória flash e possui acesso mais rápido aos dados", "d) O SSD não armazena arquivos"],
correctAnswer: 2
}
];

let currentQuestion=0;
let score=0;

function loadQuestion(){

const questionContainer=document.getElementById("question-container");
const optionsContainer=document.getElementById("options-container");
const progressText=document.getElementById("progress-text");
const progress=document.getElementById("progress");

progressText.textContent=`Pergunta ${currentQuestion+1} de ${questions.length}`;

progress.style.width=`${((currentQuestion)/questions.length)*100}%`;

questionContainer.textContent=questions[currentQuestion].question;

optionsContainer.innerHTML="";

questions[currentQuestion].options.forEach((option,index)=>{

const button=document.createElement("button");

button.textContent=option;

button.classList.add("option");

button.dataset.index=index;

button.onclick=selectOption;

optionsContainer.appendChild(button);

});

}

function selectOption(event){

const buttons=document.querySelectorAll(".option");

buttons.forEach(btn=>btn.disabled=true);

const selected=parseInt(event.target.dataset.index);

const correct=questions[currentQuestion].correctAnswer;

let delay;

if(selected===correct){

event.target.classList.add("correct");

document.getElementById("result").textContent="Correto!";

score++;

delay=1000;

}else{

event.target.classList.add("wrong");

buttons[correct].classList.add("correct");

document.getElementById("result").textContent=
`Incorreto. Resposta correta: ${questions[currentQuestion].options[correct]}`;

delay=2000;

}

currentQuestion++;

setTimeout(()=>{

document.getElementById("result").textContent="";

if(currentQuestion<questions.length){

loadQuestion();

}else{

showResult();

}

},delay);

}

function showResult(){

document.getElementById("progress").style.width="100%";

document.getElementById("question-container").textContent="Resultado Final";

document.getElementById("options-container").innerHTML="";

document.getElementById("result").textContent=
`Você acertou ${score} de ${questions.length} perguntas!`;

document.getElementById("restart-btn").style.display="inline-block";

}

document.getElementById("restart-btn").onclick=function(){

currentQuestion=0;

score=0;

this.style.display="none";

loadQuestion();

};

loadQuestion();

</script>

</body>
</html>
