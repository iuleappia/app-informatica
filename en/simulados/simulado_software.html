<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;}
body{background:linear-gradient(135deg,#4CAF50,#2E7D32);min-height:100vh;display:flex;justify-content:center;align-items:center;}
#main-wrapper{width:95%;max-width:650px;}
#quiz-container{background:#fff;padding:25px;border-radius:16px;box-shadow:0 15px 40px rgba(0,0,0,0.2);text-align:center;animation:fadeIn .4s;}
h2{margin-bottom:10px;color:#2E7D32;}
#progress-text{margin-bottom:10px;font-size:14px;color:#555;}
#progress-bar{width:100%;height:10px;background:#ddd;border-radius:20px;overflow:hidden;margin-bottom:20px;}
#progress{height:100%;width:0%;background:#4CAF50;transition:.3s;}
#question-container{font-weight:bold;margin-bottom:20px;}
#options-container{display:grid;grid-template-columns:1fr;gap:10px;}
.option{width:100%;background:#4CAF50;color:#fff;padding:14px;border:none;border-radius:8px;cursor:pointer;transition:.3s;font-size:16px;}
.option:hover{background:#388E3C;transform:scale(1.02);}
.option:disabled{opacity:.7;cursor:not-allowed;}
.correct{background:#2E7D32!important;}
.wrong{background:#C62828!important;}
#result{margin-top:15px;font-weight:bold;}
#restart-btn{margin-top:20px;padding:12px 20px;border:none;background:#2E7D32;color:white;border-radius:8px;cursor:pointer;font-size:16px;display:none;}
#restart-btn:hover{background:#1B5E20;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media(min-width:600px){#options-container{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="main-wrapper">
<div id="quiz-container">
<h2>Software</h2>
<div id="progress-text"></div>
<div id="progress-bar"><div id="progress"></div></div>
<div id="question-container"></div>
<div id="options-container"></div>
<p id="result"></p>
<button id="restart-btn">Retake Quiz</button>
</div>
</div>
<script>
const questions = [
{question:"What is software?",options:["A hardware device","A set of instructions for the computer","A type of data storage","A graphical interface"],correctAnswer:1},
{question:"What is the difference between open-source and proprietary software?",options:["The purchase price","Access to the source code","Ease of use","Processing speed"],correctAnswer:1},
{question:"What is an operating system?",options:["An antivirus program","A text editing software","A set of instructions for the hardware","A graphic design software"],correctAnswer:2},
{question:"What is the function of a compiler in software development?",options:["Execute programs","Convert source code into machine code","Create graphical interfaces","Detect viruses in code"],correctAnswer:1},
{question:"What are high-level programming languages?",options:["Languages that are hard to learn","Languages that communicate directly with hardware","Languages closer to human language","Languages used only for games"],correctAnswer:2},
{question:"What does UX stand for in software design?",options:["User Experience","User Execution","User Exception","User Expansion"],correctAnswer:0},
{question:"What is a database?",options:["A physical storage device","Image editing software","An organized collection of data","A form of communication hardware"],correctAnswer:2},
{question:"What are APIs (Application Programming Interfaces)?",options:["Complex algorithms","Pre-installed software modules","Hardware instruction sets","Sets of rules for software interaction"],correctAnswer:3},
{question:"What is debugging in programming?",options:["A type of programming language","The process of removing bugs from a program","A fast programming method","A type of specialized hardware"],correctAnswer:1},
{question:"What is the cloud in the context of software?",options:["A type of antivirus software","A type of operating system","A model for delivering services over the internet","A type of external storage"],correctAnswer:2},
{question:"What is the difference between software and firmware?",options:["Software is stored in hardware, firmware in software","Software is open-source, firmware is proprietary","Software is easily modifiable, firmware is hard to modify","Software is temporary, firmware is permanent"],correctAnswer:3},
{question:"What is an algorithm in programming?",options:["A type of hardware","A specific set of instructions","A problem-solving method","A type of graphical interface"],correctAnswer:2},
{question:"What does IoT (Internet of Things) mean?",options:["Internet Offline Transfer","Internet of Telecommunications","Internet of Things","Internet Over Time"],correctAnswer:2},
{question:"What is software versioning?",options:["A method for tracking old software versions","A type of video editing software","A software development method","A process for controlling changes in software"],correctAnswer:3},
{question:"What is cryptography in software?",options:["A data compression method","A type of programming language","A method of encoding data for security","A type of artificial intelligence algorithm"],correctAnswer:2},
{question:"What are frameworks in software development?",options:["A type of operating system","A set of libraries and guidelines for development","A type of antivirus software","A method for testing software"],correctAnswer:1},
{question:"What is DevOps in the context of software development?",options:["A type of programming language","A set of practices for integrating development and operations","A software distribution model","A type of operating system"],correctAnswer:1},
{question:"What is Scrum in software project management?",options:["A type of antivirus software","An agile development method","A service distribution model","A type of programming language"],correctAnswer:1},
{question:"What is machine learning in software?",options:["A type of antivirus software","A method of teaching programming to machines","A branch of AI that allows software to learn from data","A type of operating system"],correctAnswer:2},
{question:"What is code refactoring?",options:["A code compilation method","A process of optimizing and restructuring source code without changing its external behavior","A type of programming language","A software testing method"],correctAnswer:1}
];
let currentQuestion=0;let score=0;
function loadQuestion(){
const qc=document.getElementById("question-container");
const oc=document.getElementById("options-container");
const pt=document.getElementById("progress-text");
const p=document.getElementById("progress");
pt.textContent=`Question ${currentQuestion+1} of ${questions.length}`;
p.style.width=`${((currentQuestion)/questions.length)*100}%`;
qc.textContent=questions[currentQuestion].question;
oc.innerHTML="";
questions[currentQuestion].options.forEach((option,index)=>{
const btn=document.createElement("button");
btn.textContent=option;btn.classList.add("option");btn.dataset.index=index;btn.onclick=selectOption;oc.appendChild(btn);
});
}
function selectOption(event){
const buttons=document.querySelectorAll(".option");
buttons.forEach(btn=>btn.disabled=true);
const selected=parseInt(event.target.dataset.index);
const correct=questions[currentQuestion].correctAnswer;
let delay;
if(selected===correct){event.target.classList.add("correct");document.getElementById("result").textContent="Correct!";score++;delay=1000;}
else{event.target.classList.add("wrong");buttons[correct].classList.add("correct");document.getElementById("result").textContent=`Incorrect. Correct answer: ${questions[currentQuestion].options[correct]}`;delay=2000;}
currentQuestion++;
setTimeout(()=>{document.getElementById("result").textContent="";if(currentQuestion<questions.length){loadQuestion();}else{showResult();}},delay);
}
function showResult(){
document.getElementById("progress").style.width="100%";
document.getElementById("question-container").textContent="Final Result";
document.getElementById("options-container").innerHTML="";
document.getElementById("result").textContent=`You got ${score} out of ${questions.length} questions right!`;
document.getElementById("restart-btn").style.display="inline-block";
}
document.getElementById("restart-btn").onclick=function(){currentQuestion=0;score=0;this.style.display="none";loadQuestion();};
loadQuestion();
</script>
</body>
</html>
