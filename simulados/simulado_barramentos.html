<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barramentos</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#4CAF50,#2E7D32);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

#main-wrapper{
width:95%;
max-width:650px;
}

#quiz-container{
background:#fff;
padding:25px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
text-align:center;
animation:fadeIn .4s;
}

h2{
margin-bottom:10px;
color:#2E7D32;
}

#progress-text{
margin-bottom:10px;
font-size:14px;
color:#555;
}

#progress-bar{
width:100%;
height:10px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

#progress{
height:100%;
width:0%;
background:#4CAF50;
transition:.3s;
}

#question-container{
font-weight:bold;
margin-bottom:20px;
}

#options-container{
display:grid;
grid-template-columns:1fr;
gap:10px;
}

.option{
width:100%;
background:#4CAF50;
color:#fff;
padding:14px;
border:none;
border-radius:8px;
cursor:pointer;
transition:.3s;
font-size:16px;
}

.option:hover{
background:#388E3C;
transform:scale(1.02);
}

.option:disabled{
opacity:.7;
cursor:not-allowed;
}

.correct{
background:#2E7D32!important;
}

.wrong{
background:#C62828!important;
}

#result{
margin-top:15px;
font-weight:bold;
}

#restart-btn{
margin-top:20px;
padding:12px 20px;
border:none;
background:#2E7D32;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
display:none;
}

#restart-btn:hover{
background:#1B5E20;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

@media(min-width:600px){
#options-container{
grid-template-columns:1fr 1fr;
}
}

</style>
</head>

<body>

<div id="main-wrapper">

<div id="quiz-container">

<h2>Barramentos</h2>

<div id="progress-text"></div>

<div id="progress-bar">
<div id="progress"></div>
</div>

<div id="question-container"></div>

<div id="options-container"></div>

<p id="result"></p>

<button id="restart-btn">Refazer Simulado</button>

</div>

</div>

<script>

const questions = [
{
question: "O que é um barramento de endereço em um sistema de computador?",
options: ["Um caminho para transferência de dados entre dispositivos", "Um canal de comunicação para periféricos", "Uma via de acesso à internet", "Um meio de identificar a localização na memória"],
correctAnswer: 3
},
{
question: "Qual é a função do barramento de dados em um sistema de computador?",
options: ["Transferir endereços de memória", "Transportar informações entre componentes", "Controlar a velocidade da CPU", "Fornecer energia aos dispositivos periféricos"],
correctAnswer: 1
},
{
question: "O que é um barramento PCI em relação a computadores?",
options: ["Periféricos Conectados Internamente", "Peripheral Component Interconnect", "Processador Central Integrado", "Protocolo de Comunicação Interna"],
correctAnswer: 1
},
{
question: "Qual é a importância do barramento USB em termos de conectividade?",
options: ["Conectar a CPU à internet", "Facilitar a transferência de dados entre dispositivos", "Controlar a velocidade da RAM", "Gerenciar a alimentação elétrica do computador"],
correctAnswer: 1
},
{
question: "O que é overclocking em relação aos barramentos de informática?",
options: ["Aumentar a velocidade de processamento da CPU", "Reduzir a largura de banda do barramento de dados", "Desconectar dispositivos periféricos", "Diminuir a capacidade da memória RAM"],
correctAnswer: 0
},
{
question: "Qual é a função de um barramento FireWire em um sistema de computador?",
options: ["Transferência de dados em alta velocidade", "Controle da alimentação elétrica", "Conexão sem fio com periféricos", "Gerenciamento da BIOS"],
correctAnswer: 0
},
{
question: "O que é um barramento ISA em informática?",
options: ["Instrução de Sistema Avançado", "Industry Standard Architecture", "Internal System Access", "Integrated Software Application"],
correctAnswer: 1
},
{
question: "Como o barramento AGP é utilizado em um computador?",
options: ["Para conectar periféricos USB", "Para controlar a velocidade da CPU", "Para melhorar o desempenho gráfico", "Para gerenciar a BIOS"],
correctAnswer: 2
},
{
question: "O que é o barramento SATA em relação ao armazenamento de dados?",
options: ["Serial Advanced Technology Attachment", "System Access Time Allocation", "Sequential Access Transfer Architecture", "Storage Area Network Access"],
correctAnswer: 0
},
{
question: "Qual é a função de um barramento de expansão em um computador?",
options: ["Gerenciar a memória cache", "Conectar periféricos adicionais", "Controlar a CPU em tempo real", "Reduzir a temperatura interna do computador"],
correctAnswer: 1
},
{
question: "O que significa a sigla DDR em relação à memória RAM?",
options: ["Dynamic Data Rate", "Double Data Rate", "Digital Data Readout", "Direct Data Retrieval"],
correctAnswer: 1
},
{
question: "O que é um barramento de sistema em um computador?",
options: ["Uma rede de comunicação interna", "Um caminho exclusivo para a CPU", "Um protocolo de segurança", "Uma interface de usuário"],
correctAnswer: 0
},
{
question: "Como o barramento Ethernet é utilizado em redes de computadores?",
options: ["Para transferência de dados entre dispositivos locais", "Para controlar a velocidade da CPU", "Para gerenciar a memória cache", "Para conectar dispositivos sem fio"],
correctAnswer: 0
},
{
question: "O que é um barramento HyperTransport em sistemas de computadores?",
options: ["Um canal de comunicação entre CPU e periféricos", "Uma forma de overclocking automático", "Um protocolo de segurança avançado", "Um meio de conectar dispositivos USB"],
correctAnswer: 0
},
{
question: "Qual é a função do barramento Front Side Bus (FSB) em uma placa-mãe?",
options: ["Gerenciar a memória RAM", "Controlar a largura de banda do barramento de dados", "Conectar periféricos externos", "Facilitar a transferência de dados entre CPU e RAM"],
correctAnswer: 3
},
{
question: "O que é um barramento InfiniBand em termos de comunicação de dados?",
options: ["Um protocolo de comunicação sem fio", "Uma interface de usuário avançada", "Uma rede de alta velocidade para clusters de computadores", "Um meio de transferência de energia elétrica"],
correctAnswer: 2
},
{
question: "Como o barramento HDMI é utilizado em sistemas de entretenimento?",
options: ["Para conectar dispositivos USB", "Para transmitir áudio e vídeo de alta definição", "Para controlar a CPU em tempo real", "Para gerenciar a memória cache"],
correctAnswer: 1
},
{
question: "O que é um barramento de comunicação interna em um processador multicore?",
options: ["Um meio de transferência de energia elétrica", "Uma rede de comunicação entre processadores", "Um protocolo de segurança avançado", "Uma interface de usuário gráfica"],
correctAnswer: 1
},
{
question: "Qual é a função do barramento de controle em um computador?",
options: ["Transportar dados entre memória e CPU", "Transportar endereços de memória", "Enviar sinais de controle e sincronização entre os componentes", "Armazenar programas do sistema"],
correctAnswer: 2
},
{
question: "Qual conjunto de barramentos forma o barramento do sistema em um computador?",
options: ["USB, HDMI e SATA", "PCI, AGP e IDE", "Dados, Endereço e Controle", "Ethernet, Wi-Fi e Bluetooth"],
correctAnswer: 2
}
];

let currentQuestion=0;
let score=0;

function loadQuestion(){

const questionContainer=document.getElementById("question-container");
const optionsContainer=document.getElementById("options-container");
const progressText=document.getElementById("progress-text");
const progress=document.getElementById("progress");

progressText.textContent=`Pergunta ${currentQuestion+1} de ${questions.length}`;

progress.style.width=`${((currentQuestion)/questions.length)*100}%`;

questionContainer.textContent=questions[currentQuestion].question;

optionsContainer.innerHTML="";

questions[currentQuestion].options.forEach((option,index)=>{

const button=document.createElement("button");

button.textContent=option;

button.classList.add("option");

button.dataset.index=index;

button.onclick=selectOption;

optionsContainer.appendChild(button);

});

}

function selectOption(event){

const buttons=document.querySelectorAll(".option");

buttons.forEach(btn=>btn.disabled=true);

const selected=parseInt(event.target.dataset.index);

const correct=questions[currentQuestion].correctAnswer;

let delay;

if(selected===correct){

event.target.classList.add("correct");

document.getElementById("result").textContent="Correto!";

score++;

delay=1000;

}else{

event.target.classList.add("wrong");

buttons[correct].classList.add("correct");

document.getElementById("result").textContent=
`Incorreto. Resposta correta: ${questions[currentQuestion].options[correct]}`;

delay=2000;

}

currentQuestion++;

setTimeout(()=>{

document.getElementById("result").textContent="";

if(currentQuestion<questions.length){

loadQuestion();

}else{

showResult();

}

},delay);

}

function showResult(){

document.getElementById("progress").style.width="100%";

document.getElementById("question-container").textContent="Resultado Final";

document.getElementById("options-container").innerHTML="";

document.getElementById("result").textContent=
`Você acertou ${score} de ${questions.length} perguntas!`;

document.getElementById("restart-btn").style.display="inline-block";

}

document.getElementById("restart-btn").onclick=function(){

currentQuestion=0;

score=0;

this.style.display="none";

loadQuestion();

};

loadQuestion();

</script>

</body>
</html>
