<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardware</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;}
body{background:linear-gradient(135deg,#4CAF50,#2E7D32);min-height:100vh;display:flex;justify-content:center;align-items:center;}
#main-wrapper{width:95%;max-width:650px;}
#quiz-container{background:#fff;padding:25px;border-radius:16px;box-shadow:0 15px 40px rgba(0,0,0,0.2);text-align:center;animation:fadeIn .4s;}
h2{margin-bottom:10px;color:#2E7D32;}
#progress-text{margin-bottom:10px;font-size:14px;color:#555;}
#progress-bar{width:100%;height:10px;background:#ddd;border-radius:20px;overflow:hidden;margin-bottom:20px;}
#progress{height:100%;width:0%;background:#4CAF50;transition:.3s;}
#question-container{font-weight:bold;margin-bottom:20px;}
#options-container{display:grid;grid-template-columns:1fr;gap:10px;}
.option{width:100%;background:#4CAF50;color:#fff;padding:14px;border:none;border-radius:8px;cursor:pointer;transition:.3s;font-size:16px;}
.option:hover{background:#388E3C;transform:scale(1.02);}
.option:disabled{opacity:.7;cursor:not-allowed;}
.correct{background:#2E7D32!important;}
.wrong{background:#C62828!important;}
#result{margin-top:15px;font-weight:bold;}
#restart-btn{margin-top:20px;padding:12px 20px;border:none;background:#2E7D32;color:white;border-radius:8px;cursor:pointer;font-size:16px;display:none;}
#restart-btn:hover{background:#1B5E20;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media(min-width:600px){#options-container{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="main-wrapper">
<div id="quiz-container">
<h2>Hardware</h2>
<div id="progress-text"></div>
<div id="progress-bar"><div id="progress"></div></div>
<div id="question-container"></div>
<div id="options-container"></div>
<p id="result"></p>
<button id="restart-btn">Repetir Simulacro</button>
</div>
</div>
<script>
const questions = [
{question:"¿Qué componente es responsable de ejecutar instrucciones y realizar el procesamiento principal de la computadora?",options:["a) Memoria RAM","b) Procesador (CPU)","c) Disco duro","d) Tarjeta de red"],correctAnswer:1},
{question:"¿Cuál es la función principal de la memoria RAM en una computadora?",options:["a) Almacenar datos permanentemente","b) Ejecutar cálculos matemáticos","c) Almacenar temporalmente datos y programas en ejecución","d) Conectar dispositivos externos"],correctAnswer:2},
{question:"¿Qué dispositivo es responsable del almacenamiento permanente de archivos y programas?",options:["a) Memoria caché","b) Registros","c) HD o SSD","d) BIOS"],correctAnswer:2},
{question:"¿Cuál es la función principal de la placa base (motherboard) en una computadora?",options:["a) Procesar gráficos","b) Conectar y permitir la comunicación entre los componentes","c) Almacenar el sistema operativo","d) Controlar internet"],correctAnswer:1},
{question:"¿Qué componente es responsable del procesamiento de gráficos e imágenes?",options:["a) GPU o tarjeta de video","b) Memoria RAM","c) Chipset","d) BIOS"],correctAnswer:0},
{question:"¿Qué caracteriza a un SSD en comparación con un HD tradicional?",options:["a) Utiliza discos magnéticos","b) Es más lento en el acceso a los datos","c) Utiliza memoria flash y tiene mayor velocidad","d) No permite almacenamiento de archivos"],correctAnswer:2},
{question:"¿Qué componente de la placa base controla la comunicación entre el procesador, la memoria y los periféricos?",options:["a) Chipset","b) Fuente de alimentación","c) Memoria caché","d) Cooler"],correctAnswer:0},
{question:"¿Cuál es la función de la fuente de alimentación en una computadora?",options:["a) Almacenar datos","b) Suministrar energía eléctrica a los componentes","c) Controlar el sistema operativo","d) Procesar gráficos"],correctAnswer:1},
{question:"¿Qué tipo de dispositivo se considera periférico de entrada?",options:["a) Monitor","b) Impresora","c) Teclado","d) Altavoz"],correctAnswer:2},
{question:"¿Qué dispositivo se considera periférico de salida?",options:["a) Ratón","b) Teclado","c) Escáner","d) Monitor"],correctAnswer:3},
{question:"¿Qué es el BIOS en una computadora?",options:["a) Sistema básico que inicializa el hardware","b) Un tipo de memoria RAM","c) Un dispositivo de almacenamiento","d) Un software antivirus"],correctAnswer:0},
{question:"¿Cuál es la función de la memoria caché en el procesador?",options:["a) Almacenar archivos del usuario","b) Acelerar el acceso a datos frecuentemente utilizados","c) Sustituir la memoria RAM","d) Almacenar el sistema operativo"],correctAnswer:1},
{question:"¿Qué es un bus en una computadora?",options:["a) Un dispositivo de almacenamiento","b) Un camino de comunicación entre los componentes","c) Un tipo de procesador","d) Un programa del sistema operativo"],correctAnswer:1},
{question:"¿Qué bus es responsable de transportar datos entre los componentes de la computadora?",options:["a) Bus de control","b) Bus de direcciones","c) Bus de datos","d) Bus gráfico"],correctAnswer:2},
{question:"¿Qué tecnología permite usar varios discos para mejorar el rendimiento o la seguridad de los datos?",options:["a) RAID","b) BIOS","c) GPU","d) HDMI"],correctAnswer:0},
{question:"¿Qué puerto se usa ampliamente para conectar periféricos como teclado, ratón y memorias USB?",options:["a) HDMI","b) USB","c) VGA","d) PS/2"],correctAnswer:1},
{question:"¿Qué puerto se usa principalmente para transmisión de video digital en alta definición?",options:["a) HDMI","b) USB","c) Ethernet","d) Serie"],correctAnswer:0},
{question:"¿Qué componente es responsable de mantener la temperatura adecuada del procesador?",options:["a) Cooler","b) Chipset","c) BIOS","d) Bus"],correctAnswer:0},
{question:"¿Qué dispositivo permite conectar la computadora a una red o a internet?",options:["a) Tarjeta de red","b) Tarjeta de video","c) Memoria RAM","d) Procesador"],correctAnswer:0},
{question:"¿Cuál es la principal diferencia entre HD y SSD?",options:["a) El SSD utiliza partes mecánicas","b) El HD es más rápido que el SSD","c) El SSD utiliza memoria flash y tiene acceso más rápido a los datos","d) El SSD no almacena archivos"],correctAnswer:2}
];
let currentQuestion=0;let score=0;
function loadQuestion(){
const qc=document.getElementById("question-container");
const oc=document.getElementById("options-container");
const pt=document.getElementById("progress-text");
const p=document.getElementById("progress");
pt.textContent=`Pregunta ${currentQuestion+1} de ${questions.length}`;
p.style.width=`${((currentQuestion)/questions.length)*100}%`;
qc.textContent=questions[currentQuestion].question;
oc.innerHTML="";
questions[currentQuestion].options.forEach((option,index)=>{
const btn=document.createElement("button");
btn.textContent=option;btn.classList.add("option");btn.dataset.index=index;btn.onclick=selectOption;oc.appendChild(btn);
});
}
function selectOption(event){
const buttons=document.querySelectorAll(".option");
buttons.forEach(btn=>btn.disabled=true);
const selected=parseInt(event.target.dataset.index);
const correct=questions[currentQuestion].correctAnswer;
let delay;
if(selected===correct){event.target.classList.add("correct");document.getElementById("result").textContent="¡Correcto!";score++;delay=1000;}
else{event.target.classList.add("wrong");buttons[correct].classList.add("correct");document.getElementById("result").textContent=`Incorrecto. Respuesta correcta: ${questions[currentQuestion].options[correct]}`;delay=2000;}
currentQuestion++;
setTimeout(()=>{document.getElementById("result").textContent="";if(currentQuestion<questions.length){loadQuestion();}else{showResult();}},delay);
}
function showResult(){
document.getElementById("progress").style.width="100%";
document.getElementById("question-container").textContent="Resultado Final";
document.getElementById("options-container").innerHTML="";
document.getElementById("result").textContent=`¡Acertaste ${score} de ${questions.length} preguntas!`;
document.getElementById("restart-btn").style.display="inline-block";
}
document.getElementById("restart-btn").onclick=function(){currentQuestion=0;score=0;this.style.display="none";loadQuestion();};
loadQuestion();
</script>
</body>
</html>
