<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algorithms and Programming</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;}
body{background:linear-gradient(135deg,#4CAF50,#2E7D32);min-height:100vh;display:flex;justify-content:center;align-items:center;}
#main-wrapper{width:95%;max-width:650px;}
#quiz-container{background:#fff;padding:25px;border-radius:16px;box-shadow:0 15px 40px rgba(0,0,0,0.2);text-align:center;animation:fadeIn .4s;}
h2{margin-bottom:10px;color:#2E7D32;}
#progress-text{margin-bottom:10px;font-size:14px;color:#555;}
#progress-bar{width:100%;height:10px;background:#ddd;border-radius:20px;overflow:hidden;margin-bottom:20px;}
#progress{height:100%;width:0%;background:#4CAF50;transition:.3s;}
#question-container{font-weight:bold;margin-bottom:20px;}
#options-container{display:grid;grid-template-columns:1fr;gap:10px;}
.option{width:100%;background:#4CAF50;color:#fff;padding:14px;border:none;border-radius:8px;cursor:pointer;transition:.3s;font-size:16px;}
.option:hover{background:#388E3C;transform:scale(1.02);}
.option:disabled{opacity:.7;cursor:not-allowed;}
.correct{background:#2E7D32!important;}
.wrong{background:#C62828!important;}
#result{margin-top:15px;font-weight:bold;}
#restart-btn{margin-top:20px;padding:12px 20px;border:none;background:#2E7D32;color:white;border-radius:8px;cursor:pointer;font-size:16px;display:none;}
#restart-btn:hover{background:#1B5E20;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media(min-width:600px){#options-container{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="main-wrapper">
<div id="quiz-container">
<h2>Algorithms and Programming</h2>
<div id="progress-text"></div>
<div id="progress-bar"><div id="progress"></div></div>
<div id="question-container"></div>
<div id="options-container"></div>
<p id="result"></p>
<button id="restart-btn">Retake Quiz</button>
</div>
</div>
<script>
const questions = [
{question:"What is an algorithm?",options:["A type of hardware","A step-by-step set of instructions for solving a problem","A programming language","A data storage device"],correctAnswer:1},
{question:"What is the main function of an algorithm?",options:["Process input data","Store information permanently","Perform complex mathematical operations","Solve a problem efficiently"],correctAnswer:3},
{question:"What is the complexity of an algorithm?",options:["The amount of code written","The time and space required to execute the algorithm","The number of instructions per second","The algorithm's ability to adapt to different problems"],correctAnswer:1},
{question:"In programming, what is a variable?",options:["A constant value","A data type","A storage location for data","A mathematical expression"],correctAnswer:2},
{question:"What is a control structure in algorithms?",options:["An input device","A set of conditional or repetition instructions","A data type","A central processing unit"],correctAnswer:1},
{question:"What is recursion in algorithms?",options:["A type of loop","A technique where a function calls itself","A method for permanently storing data","A concept related to code complexity"],correctAnswer:1},
{question:"What is a linear search?",options:["A type of control structure","A data sorting method","A technique for finding an element in a list by going through it sequentially","A form of encryption"],correctAnswer:2},
{question:"What is a sorting algorithm?",options:["A method for organizing data in a hierarchical structure","A type of search","A set of instructions for printing results on screen","A method for arranging elements in a specific order"],correctAnswer:3},
{question:"What is an infinite loop in programming?",options:["A syntax error","An instruction that is never executed","A control structure that repeats indefinitely","A always-false condition"],correctAnswer:2},
{question:"What is the importance of efficiency in algorithms?",options:["Efficiency is not relevant","It only affects code readability","It influences resource consumption such as time and space","It only matters for simple algorithms"],correctAnswer:2},
{question:"What is pseudocode?",options:["A type of programming language","Real source code","A representation of algorithms using a mix of natural language and programming elements","An encryption technique"],correctAnswer:3},
{question:"What is a data structure in algorithms?",options:["A set of variables","A way to organize and store data so it can be used efficiently","A type of conditional instruction","A sorting method"],correctAnswer:1},
{question:"What is Big-O notation?",options:["A programming language","A way to represent algorithms using drawings","A notation used to describe the performance or complexity of an algorithm in terms of time or space","A type of control structure"],correctAnswer:2},
{question:"What is a binary search algorithm?",options:["A method for searching information on the internet","A search in a sorted list by repeatedly halving it","A technique for searching data in reverse order","A conditional control structure"],correctAnswer:1},
{question:"What is a greedy algorithm?",options:["An algorithm that always picks the option that seems best at the moment","An algorithm that avoids making decisions","An algorithm that requires many resources","An efficient sorting method"],correctAnswer:0},
{question:"What is time analysis in algorithms?",options:["An analysis of code efficiency in terms of performance","An analysis of the amount of code written","An encryption method","A type of search"],correctAnswer:0},
{question:"What is an insertion sort algorithm?",options:["A method for organizing random data","An algorithm that inserts data into a list randomly","A sorting method that builds a sorted sequence one element at a time","A search technique"],correctAnswer:2},
{question:"What is a graph in algorithms?",options:["A type of variable","A flow control structure","A visual representation of data","A set of vertices and edges connecting those vertices"],correctAnswer:3},
{question:"What is tail recursion?",options:["A technique for searching data at the bottom of a list","A type of loop","A form of calling the recursive function at the end of execution","A complex data structure"],correctAnswer:2},
{question:"What is the quicksort algorithm?",options:["A method for organizing data slowly","A type of search in a sorted list","An efficient sorting algorithm that uses a divide-and-conquer approach","An encryption technique"],correctAnswer:2}
];
let currentQuestion=0;let score=0;
function loadQuestion(){
const qc=document.getElementById("question-container");
const oc=document.getElementById("options-container");
const pt=document.getElementById("progress-text");
const p=document.getElementById("progress");
pt.textContent=`Question ${currentQuestion+1} of ${questions.length}`;
p.style.width=`${((currentQuestion)/questions.length)*100}%`;
qc.textContent=questions[currentQuestion].question;
oc.innerHTML="";
questions[currentQuestion].options.forEach((option,index)=>{
const btn=document.createElement("button");
btn.textContent=option;btn.classList.add("option");btn.dataset.index=index;btn.onclick=selectOption;oc.appendChild(btn);
});
}
function selectOption(event){
const buttons=document.querySelectorAll(".option");
buttons.forEach(btn=>btn.disabled=true);
const selected=parseInt(event.target.dataset.index);
const correct=questions[currentQuestion].correctAnswer;
let delay;
if(selected===correct){event.target.classList.add("correct");document.getElementById("result").textContent="Correct!";score++;delay=1000;}
else{event.target.classList.add("wrong");buttons[correct].classList.add("correct");document.getElementById("result").textContent=`Incorrect. Correct answer: ${questions[currentQuestion].options[correct]}`;delay=2000;}
currentQuestion++;
setTimeout(()=>{document.getElementById("result").textContent="";if(currentQuestion<questions.length){loadQuestion();}else{showResult();}},delay);
}
function showResult(){
document.getElementById("progress").style.width="100%";
document.getElementById("question-container").textContent="Final Result";
document.getElementById("options-container").innerHTML="";
document.getElementById("result").textContent=`You got ${score} out of ${questions.length} questions right!`;
document.getElementById("restart-btn").style.display="inline-block";
}
document.getElementById("restart-btn").onclick=function(){currentQuestion=0;score=0;this.style.display="none";loadQuestion();};
loadQuestion();
</script>
</body>
</html>
