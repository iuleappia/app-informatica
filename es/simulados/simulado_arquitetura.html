<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arquitectura de Computadoras</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;}
body{background:linear-gradient(135deg,#4CAF50,#2E7D32);min-height:100vh;display:flex;justify-content:center;align-items:center;}
#main-wrapper{width:95%;max-width:650px;}
#quiz-container{background:#fff;padding:25px;border-radius:16px;box-shadow:0 15px 40px rgba(0,0,0,0.2);text-align:center;animation:fadeIn .4s;}
h2{margin-bottom:10px;color:#2E7D32;}
#progress-text{margin-bottom:10px;font-size:14px;color:#555;}
#progress-bar{width:100%;height:10px;background:#ddd;border-radius:20px;overflow:hidden;margin-bottom:20px;}
#progress{height:100%;width:0%;background:#4CAF50;transition:.3s;}
#question-container{font-weight:bold;margin-bottom:20px;}
#options-container{display:grid;grid-template-columns:1fr;gap:10px;}
.option{width:100%;background:#4CAF50;color:#fff;padding:14px;border:none;border-radius:8px;cursor:pointer;transition:.3s;font-size:16px;}
.option:hover{background:#388E3C;transform:scale(1.02);}
.option:disabled{opacity:.7;cursor:not-allowed;}
.correct{background:#2E7D32!important;}
.wrong{background:#C62828!important;}
#result{margin-top:15px;font-weight:bold;}
#restart-btn{margin-top:20px;padding:12px 20px;border:none;background:#2E7D32;color:white;border-radius:8px;cursor:pointer;font-size:16px;display:none;}
#restart-btn:hover{background:#1B5E20;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media(min-width:600px){#options-container{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="main-wrapper">
<div id="quiz-container">
<h2>Arquitectura de Computadoras</h2>
<div id="progress-text"></div>
<div id="progress-bar"><div id="progress"></div></div>
<div id="question-container"></div>
<div id="options-container"></div>
<p id="result"></p>
<button id="restart-btn">Repetir Simulacro</button>
</div>
</div>
<script>
const questions = [
{question:"En el modelo de Von Neumann, ¿cuál es una característica fundamental?",options:["Memoria separada para datos e instrucciones","Memoria única para datos e instrucciones","Procesador sin registros","Uso exclusivo de memoria caché"],correctAnswer:1},
{question:"¿Qué componente es responsable de ejecutar instrucciones en una computadora?",options:["HD","CPU","Fuente de alimentación","Tarjeta de red"],correctAnswer:1},
{question:"¿Qué unidad de la CPU realiza operaciones matemáticas y lógicas?",options:["Unidad de Control","ALU","Bus de datos","Memoria caché"],correctAnswer:1},
{question:"¿Qué son los registros en un procesador?",options:["Memorias externas de gran capacidad","Áreas de almacenamiento muy rápidas dentro de la CPU","Dispositivos de entrada de datos","Memorias usadas solo para copias de seguridad"],correctAnswer:1},
{question:"En la jerarquía de memoria, ¿cuál es la más rápida?",options:["HD","RAM","Caché","SSD"],correctAnswer:2},
{question:"¿Qué memoria se considera volátil?",options:["ROM","HD","RAM","SSD"],correctAnswer:2},
{question:"¿Qué dispositivo se usa para almacenamiento permanente de datos?",options:["RAM","Caché","Registros","HD o SSD"],correctAnswer:3},
{question:"En la jerarquía de memoria, ¿cuál es más rápida que la RAM y más lenta que los registros?",options:["Caché","HD","SSD","Memoria virtual"],correctAnswer:0},
{question:"¿Cuál es la función de la Unidad de Control dentro de la CPU?",options:["Ejecutar cálculos matemáticos","Generar gráficos","Controlar la ejecución de las instrucciones","Almacenar archivos"],correctAnswer:2},
{question:"¿Qué caracteriza a la arquitectura RISC?",options:["Gran cantidad de instrucciones complejas","Conjunto reducido de instrucciones simples","Ausencia de registros","Uso exclusivo de memoria RAM"],correctAnswer:1},
{question:"¿Qué caracteriza a la arquitectura CISC?",options:["Instrucciones simples y pocas","Conjunto complejo de instrucciones","Ausencia de memoria caché","Procesadores sin pipeline"],correctAnswer:1},
{question:"¿Cuál de las alternativas representa correctamente la jerarquía de memoria de más rápida a más lenta?",options:["HD → RAM → Caché → Registros","Registros → Caché → RAM → HD/SSD","RAM → Registros → Caché → HD","Caché → HD → RAM → Registros"],correctAnswer:1},
{question:"¿Cuál es la función principal de la memoria caché?",options:["Almacenar archivos del usuario","Acelerar el acceso a datos frecuentemente usados","Sustituir el HD","Almacenar el sistema operativo permanentemente"],correctAnswer:1},
{question:"En el modelo de Von Neumann, ¿qué componente almacena instrucciones y datos?",options:["Memoria principal","CPU","ALU","Registro de control"],correctAnswer:0},
{question:"¿Qué componente ejecuta operaciones como suma, resta y comparaciones?",options:["ALU","Caché","Bus","Fuente"],correctAnswer:0},
{question:"¿Qué tipo de memoria mantiene los datos incluso sin energía?",options:["RAM","Caché","Registros","HD o SSD"],correctAnswer:3},
{question:"¿Cuál es la principal diferencia entre RISC y CISC?",options:["RISC tiene instrucciones simples y CISC tiene instrucciones complejas","RISC usa HD y CISC usa SSD","RISC no usa memoria","CISC no usa registros"],correctAnswer:0},
{question:"¿Qué componente de la CPU almacena temporalmente datos que están siendo procesados?",options:["Registros","HD","Fuente","Placa base"],correctAnswer:0},
{question:"¿Qué significa la sigla CPU?",options:["Central Processing Unit","Computer Processing Unit","Central Peripheral Unit","Control Processing Unit"],correctAnswer:0},
{question:"¿Cuál es la principal ventaja del SSD sobre el HD?",options:["Mayor tamaño físico","Mayor velocidad de acceso a los datos","Uso exclusivo en servidores","Menor capacidad de almacenamiento"],correctAnswer:1}
];
let currentQuestion=0;let score=0;
function loadQuestion(){
const qc=document.getElementById("question-container");
const oc=document.getElementById("options-container");
const pt=document.getElementById("progress-text");
const p=document.getElementById("progress");
pt.textContent=`Pregunta ${currentQuestion+1} de ${questions.length}`;
p.style.width=`${((currentQuestion)/questions.length)*100}%`;
qc.textContent=questions[currentQuestion].question;
oc.innerHTML="";
questions[currentQuestion].options.forEach((option,index)=>{
const btn=document.createElement("button");
btn.textContent=option;btn.classList.add("option");btn.dataset.index=index;btn.onclick=selectOption;oc.appendChild(btn);
});
}
function selectOption(event){
const buttons=document.querySelectorAll(".option");
buttons.forEach(btn=>btn.disabled=true);
const selected=parseInt(event.target.dataset.index);
const correct=questions[currentQuestion].correctAnswer;
let delay;
if(selected===correct){event.target.classList.add("correct");document.getElementById("result").textContent="¡Correcto!";score++;delay=1000;}
else{event.target.classList.add("wrong");buttons[correct].classList.add("correct");document.getElementById("result").textContent=`Incorrecto. Respuesta correcta: ${questions[currentQuestion].options[correct]}`;delay=2000;}
currentQuestion++;
setTimeout(()=>{document.getElementById("result").textContent="";if(currentQuestion<questions.length){loadQuestion();}else{showResult();}},delay);
}
function showResult(){
document.getElementById("progress").style.width="100%";
document.getElementById("question-container").textContent="Resultado Final";
document.getElementById("options-container").innerHTML="";
document.getElementById("result").textContent=`¡Acertaste ${score} de ${questions.length} preguntas!`;
document.getElementById("restart-btn").style.display="inline-block";
}
document.getElementById("restart-btn").onclick=function(){currentQuestion=0;score=0;this.style.display="none";loadQuestion();};
loadQuestion();
</script>
</body>
</html>
