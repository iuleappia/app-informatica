<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Introdução à Informática</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#4CAF50,#2E7D32);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

#main-wrapper{
width:95%;
max-width:650px;
}

#quiz-container{
background:#fff;
padding:25px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
text-align:center;
animation:fadeIn .4s;
}

h2{
margin-bottom:10px;
color:#2E7D32;
}

#progress-text{
margin-bottom:10px;
font-size:14px;
color:#555;
}

#progress-bar{
width:100%;
height:10px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

#progress{
height:100%;
width:0%;
background:#4CAF50;
transition:.3s;
}

#question-container{
font-weight:bold;
margin-bottom:20px;
}

#options-container{
display:grid;
grid-template-columns:1fr;
gap:10px;
}

.option{
width:100%;
background:#4CAF50;
color:#fff;
padding:14px;
border:none;
border-radius:8px;
cursor:pointer;
transition:.3s;
font-size:16px;
}

.option:hover{
background:#388E3C;
transform:scale(1.02);
}

.option:disabled{
opacity:.7;
cursor:not-allowed;
}

.correct{
background:#2E7D32!important;
}

.wrong{
background:#C62828!important;
}

#result{
margin-top:15px;
font-weight:bold;
}

#restart-btn{
margin-top:20px;
padding:12px 20px;
border:none;
background:#2E7D32;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
display:none;
}

#restart-btn:hover{
background:#1B5E20;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

@media(min-width:600px){
#options-container{
grid-template-columns:1fr 1fr;
}
}

</style>
</head>

<body>

<div id="main-wrapper">

<div id="quiz-container">

<h2>Introdução à Informática</h2>

<div id="progress-text"></div>

<div id="progress-bar">
<div id="progress"></div>
</div>

<div id="question-container"></div>

<div id="options-container"></div>

<p id="result"></p>

<button id="restart-btn">Refazer Simulado</button>

</div>

</div>

<script>

const questions = [
{
question: "Qual dos programas abaixo é considerado um navegador de internet?",
options: ["Google Chrome", "Microsoft Word", "Excel", "PowerPoint"],
correctAnswer: 0
},
{
question: "Qual é a principal função de um navegador de internet?",
options: ["Editar textos", "Acessar páginas da web", "Criar planilhas", "Instalar programas"],
correctAnswer: 1
},
{
question: "Qual programa do Microsoft Office é utilizado para criar planilhas?",
options: ["Word", "PowerPoint", "Excel", "Access"],
correctAnswer: 2
},
{
question: "No Microsoft Word, qual é a principal função do programa?",
options: ["Criar apresentações", "Editar textos e documentos", "Criar bancos de dados", "Gerenciar redes"],
correctAnswer: 1
},
{
question: "Qual programa do pacote Office é usado para criar apresentações de slides?",
options: ["Excel", "PowerPoint", "Word", "Outlook"],
correctAnswer: 1
},
{
question: "Qual sistema operacional é desenvolvido pela Microsoft?",
options: ["Linux", "Windows", "Android", "macOS"],
correctAnswer: 1
},
{
question: "Qual é a função de um sistema operacional?",
options: ["Criar páginas web", "Gerenciar hardware e software do computador", "Editar vídeos", "Criar planilhas"],
correctAnswer: 1
},
{
question: "Qual dos seguintes é um sistema operacional?",
options: ["Windows", "Google Chrome", "Word", "Excel"],
correctAnswer: 0
},
{
question: "O que significa a sigla URL na internet?",
options: ["Endereço de um recurso na internet", "Programa de edição de texto", "Sistema operacional", "Tipo de vírus"],
correctAnswer: 0
},
{
question: "Qual é a função de um mecanismo de busca como o Google?",
options: ["Editar documentos", "Pesquisar informações na internet", "Criar planilhas", "Instalar programas"],
correctAnswer: 1
},
{
question: "Qual destes é um navegador de internet?",
options: ["Mozilla Firefox", "Microsoft Excel", "Adobe Photoshop", "Bloco de Notas"],
correctAnswer: 0
},
{
question: "Qual é o atalho comum para copiar um texto no Windows?",
options: ["Ctrl + C", "Ctrl + V", "Ctrl + X", "Ctrl + Z"],
correctAnswer: 0
},
{
question: "Qual é o atalho comum para colar um conteúdo copiado?",
options: ["Ctrl + A", "Ctrl + C", "Ctrl + V", "Ctrl + S"],
correctAnswer: 2
},
{
question: "No Excel, uma célula é:",
options: ["Um gráfico", "Um espaço onde os dados são inseridos", "Um arquivo", "Um slide"],
correctAnswer: 1
},
{
question: "O que é necessário para acessar a internet?",
options: ["Somente um teclado", "Uma conexão de rede", "Apenas um monitor", "Uma impressora"],
correctAnswer: 1
},
{
question: "Qual destes serviços permite enviar mensagens eletrônicas?",
options: ["E-mail", "Planilha", "Slide", "Sistema operacional"],
correctAnswer: 0
},
{
question: "Qual é a função do botão 'Atualizar' em um navegador?",
options: ["Fechar o navegador", "Recarregar a página atual", "Salvar a página", "Imprimir a página"],
correctAnswer: 1
},
{
question: "O que é um download?",
options: ["Enviar arquivo para a internet", "Baixar arquivo da internet para o dispositivo", "Apagar arquivos", "Criar arquivos"],
correctAnswer: 1
},
{
question: "Qual é a função da lixeira no sistema operacional?",
options: ["Armazenar arquivos apagados temporariamente", "Criar backups", "Instalar programas", "Abrir páginas da internet"],
correctAnswer: 0
},
{
question: "Qual destas opções é um sistema operacional para celulares?",
options: ["Android", "Excel", "Word", "PowerPoint"],
correctAnswer: 0
}
];

let currentQuestion=0;
let score=0;

function loadQuestion(){

const questionContainer=document.getElementById("question-container");
const optionsContainer=document.getElementById("options-container");
const progressText=document.getElementById("progress-text");
const progress=document.getElementById("progress");

progressText.textContent=`Pergunta ${currentQuestion+1} de ${questions.length}`;

progress.style.width=`${((currentQuestion)/questions.length)*100}%`;

questionContainer.textContent=questions[currentQuestion].question;

optionsContainer.innerHTML="";

questions[currentQuestion].options.forEach((option,index)=>{

const button=document.createElement("button");

button.textContent=option;

button.classList.add("option");

button.dataset.index=index;

button.onclick=selectOption;

optionsContainer.appendChild(button);

});

}

function selectOption(event){

const buttons=document.querySelectorAll(".option");

buttons.forEach(btn=>btn.disabled=true);

const selected=parseInt(event.target.dataset.index);

const correct=questions[currentQuestion].correctAnswer;

let delay;

if(selected===correct){

event.target.classList.add("correct");

document.getElementById("result").textContent="Correto!";

score++;

delay=1000;

}else{

event.target.classList.add("wrong");

buttons[correct].classList.add("correct");

document.getElementById("result").textContent=
`Incorreto. Resposta correta: ${questions[currentQuestion].options[correct]}`;

delay=2000;

}

currentQuestion++;

setTimeout(()=>{

document.getElementById("result").textContent="";

if(currentQuestion<questions.length){

loadQuestion();

}else{

showResult();

}

},delay);

}

function showResult(){

document.getElementById("progress").style.width="100%";

document.getElementById("question-container").textContent="Resultado Final";

document.getElementById("options-container").innerHTML="";

document.getElementById("result").textContent=
`Você acertou ${score} de ${questions.length} perguntas!`;

document.getElementById("restart-btn").style.display="inline-block";

}

document.getElementById("restart-btn").onclick=function(){

currentQuestion=0;

score=0;

this.style.display="none";

loadQuestion();

};

loadQuestion();

</script>

</body>
</html>
