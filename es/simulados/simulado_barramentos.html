<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buses de Datos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;}
body{background:linear-gradient(135deg,#4CAF50,#2E7D32);min-height:100vh;display:flex;justify-content:center;align-items:center;}
#main-wrapper{width:95%;max-width:650px;}
#quiz-container{background:#fff;padding:25px;border-radius:16px;box-shadow:0 15px 40px rgba(0,0,0,0.2);text-align:center;animation:fadeIn .4s;}
h2{margin-bottom:10px;color:#2E7D32;}
#progress-text{margin-bottom:10px;font-size:14px;color:#555;}
#progress-bar{width:100%;height:10px;background:#ddd;border-radius:20px;overflow:hidden;margin-bottom:20px;}
#progress{height:100%;width:0%;background:#4CAF50;transition:.3s;}
#question-container{font-weight:bold;margin-bottom:20px;}
#options-container{display:grid;grid-template-columns:1fr;gap:10px;}
.option{width:100%;background:#4CAF50;color:#fff;padding:14px;border:none;border-radius:8px;cursor:pointer;transition:.3s;font-size:16px;}
.option:hover{background:#388E3C;transform:scale(1.02);}
.option:disabled{opacity:.7;cursor:not-allowed;}
.correct{background:#2E7D32!important;}
.wrong{background:#C62828!important;}
#result{margin-top:15px;font-weight:bold;}
#restart-btn{margin-top:20px;padding:12px 20px;border:none;background:#2E7D32;color:white;border-radius:8px;cursor:pointer;font-size:16px;display:none;}
#restart-btn:hover{background:#1B5E20;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media(min-width:600px){#options-container{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="main-wrapper">
<div id="quiz-container">
<h2>Buses de Datos</h2>
<div id="progress-text"></div>
<div id="progress-bar"><div id="progress"></div></div>
<div id="question-container"></div>
<div id="options-container"></div>
<p id="result"></p>
<button id="restart-btn">Repetir Simulacro</button>
</div>
</div>
<script>
const questions = [
{question:"¿Qué es un bus de direcciones en un sistema de computadora?",options:["Un camino para transferencia de datos entre dispositivos","Un canal de comunicación para periféricos","Una vía de acceso a internet","Un medio para identificar la ubicación en la memoria"],correctAnswer:3},
{question:"¿Cuál es la función del bus de datos en un sistema de computadora?",options:["Transferir direcciones de memoria","Transportar información entre componentes","Controlar la velocidad de la CPU","Suministrar energía a los dispositivos periféricos"],correctAnswer:1},
{question:"¿Qué es un bus PCI en relación con las computadoras?",options:["Periféricos Conectados Internamente","Peripheral Component Interconnect","Procesador Central Integrado","Protocolo de Comunicación Interna"],correctAnswer:1},
{question:"¿Cuál es la importancia del bus USB en términos de conectividad?",options:["Conectar la CPU a internet","Facilitar la transferencia de datos entre dispositivos","Controlar la velocidad de la RAM","Gestionar la alimentación eléctrica de la computadora"],correctAnswer:1},
{question:"¿Qué es el overclocking en relación con los buses de informática?",options:["Aumentar la velocidad de procesamiento de la CPU","Reducir el ancho de banda del bus de datos","Desconectar dispositivos periféricos","Disminuir la capacidad de la memoria RAM"],correctAnswer:0},
{question:"¿Cuál es la función de un bus FireWire en un sistema de computadora?",options:["Transferencia de datos a alta velocidad","Control de la alimentación eléctrica","Conexión inalámbrica con periféricos","Gestión del BIOS"],correctAnswer:0},
{question:"¿Qué es un bus ISA en informática?",options:["Instrucción de Sistema Avanzado","Industry Standard Architecture","Internal System Access","Integrated Software Application"],correctAnswer:1},
{question:"¿Cómo se utiliza el bus AGP en una computadora?",options:["Para conectar periféricos USB","Para controlar la velocidad de la CPU","Para mejorar el rendimiento gráfico","Para gestionar el BIOS"],correctAnswer:2},
{question:"¿Qué es el bus SATA en relación con el almacenamiento de datos?",options:["Serial Advanced Technology Attachment","System Access Time Allocation","Sequential Access Transfer Architecture","Storage Area Network Access"],correctAnswer:0},
{question:"¿Cuál es la función de un bus de expansión en una computadora?",options:["Gestionar la memoria caché","Conectar periféricos adicionales","Controlar la CPU en tiempo real","Reducir la temperatura interna de la computadora"],correctAnswer:1},
{question:"¿Qué significa la sigla DDR en relación con la memoria RAM?",options:["Dynamic Data Rate","Double Data Rate","Digital Data Readout","Direct Data Retrieval"],correctAnswer:1},
{question:"¿Qué es un bus de sistema en una computadora?",options:["Una red de comunicación interna","Un camino exclusivo para la CPU","Un protocolo de seguridad","Una interfaz de usuario"],correctAnswer:0},
{question:"¿Cómo se utiliza el bus Ethernet en redes de computadoras?",options:["Para transferencia de datos entre dispositivos locales","Para controlar la velocidad de la CPU","Para gestionar la memoria caché","Para conectar dispositivos inalámbricos"],correctAnswer:0},
{question:"¿Qué es un bus HyperTransport en sistemas de computadoras?",options:["Un canal de comunicación entre CPU y periféricos","Una forma de overclocking automático","Un protocolo de seguridad avanzado","Un medio para conectar dispositivos USB"],correctAnswer:0},
{question:"¿Cuál es la función del Front Side Bus (FSB) en una placa base?",options:["Gestionar la memoria RAM","Controlar el ancho de banda del bus de datos","Conectar periféricos externos","Facilitar la transferencia de datos entre CPU y RAM"],correctAnswer:3},
{question:"¿Qué es un bus InfiniBand en términos de comunicación de datos?",options:["Un protocolo de comunicación inalámbrica","Una interfaz de usuario avanzada","Una red de alta velocidad para clústeres de computadoras","Un medio de transferencia de energía eléctrica"],correctAnswer:2},
{question:"¿Cómo se utiliza el bus HDMI en sistemas de entretenimiento?",options:["Para conectar dispositivos USB","Para transmitir audio y video en alta definición","Para controlar la CPU en tiempo real","Para gestionar la memoria caché"],correctAnswer:1},
{question:"¿Qué es un bus de comunicación interna en un procesador multicore?",options:["Un medio de transferencia de energía eléctrica","Una red de comunicación entre procesadores","Un protocolo de seguridad avanzado","Una interfaz de usuario gráfica"],correctAnswer:1},
{question:"¿Cuál es la función del bus de control en una computadora?",options:["Transportar datos entre memoria y CPU","Transportar direcciones de memoria","Enviar señales de control y sincronización entre los componentes","Almacenar programas del sistema"],correctAnswer:2},
{question:"¿Qué conjunto de buses forma el bus del sistema en una computadora?",options:["USB, HDMI y SATA","PCI, AGP e IDE","Datos, Dirección y Control","Ethernet, Wi-Fi y Bluetooth"],correctAnswer:2}
];
let currentQuestion=0;let score=0;
function loadQuestion(){
const qc=document.getElementById("question-container");
const oc=document.getElementById("options-container");
const pt=document.getElementById("progress-text");
const p=document.getElementById("progress");
pt.textContent=`Pregunta ${currentQuestion+1} de ${questions.length}`;
p.style.width=`${((currentQuestion)/questions.length)*100}%`;
qc.textContent=questions[currentQuestion].question;
oc.innerHTML="";
questions[currentQuestion].options.forEach((option,index)=>{
const btn=document.createElement("button");
btn.textContent=option;btn.classList.add("option");btn.dataset.index=index;btn.onclick=selectOption;oc.appendChild(btn);
});
}
function selectOption(event){
const buttons=document.querySelectorAll(".option");
buttons.forEach(btn=>btn.disabled=true);
const selected=parseInt(event.target.dataset.index);
const correct=questions[currentQuestion].correctAnswer;
let delay;
if(selected===correct){event.target.classList.add("correct");document.getElementById("result").textContent="¡Correcto!";score++;delay=1000;}
else{event.target.classList.add("wrong");buttons[correct].classList.add("correct");document.getElementById("result").textContent=`Incorrecto. Respuesta correcta: ${questions[currentQuestion].options[correct]}`;delay=2000;}
currentQuestion++;
setTimeout(()=>{document.getElementById("result").textContent="";if(currentQuestion<questions.length){loadQuestion();}else{showResult();}},delay);
}
function showResult(){
document.getElementById("progress").style.width="100%";
document.getElementById("question-container").textContent="Resultado Final";
document.getElementById("options-container").innerHTML="";
document.getElementById("result").textContent=`¡Acertaste ${score} de ${questions.length} preguntas!`;
document.getElementById("restart-btn").style.display="inline-block";
}
document.getElementById("restart-btn").onclick=function(){currentQuestion=0;score=0;this.style.display="none";loadQuestion();};
loadQuestion();
</script>
</body>
</html>
