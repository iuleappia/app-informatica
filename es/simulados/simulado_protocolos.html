<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocolos de Red</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;}
body{background:linear-gradient(135deg,#4CAF50,#2E7D32);min-height:100vh;display:flex;justify-content:center;align-items:center;}
#main-wrapper{width:95%;max-width:650px;}
#quiz-container{background:#fff;padding:25px;border-radius:16px;box-shadow:0 15px 40px rgba(0,0,0,0.2);text-align:center;animation:fadeIn .4s;}
h2{margin-bottom:10px;color:#2E7D32;}
#progress-text{margin-bottom:10px;font-size:14px;color:#555;}
#progress-bar{width:100%;height:10px;background:#ddd;border-radius:20px;overflow:hidden;margin-bottom:20px;}
#progress{height:100%;width:0%;background:#4CAF50;transition:.3s;}
#question-container{font-weight:bold;margin-bottom:20px;}
#options-container{display:grid;grid-template-columns:1fr;gap:10px;}
.option{width:100%;background:#4CAF50;color:#fff;padding:14px;border:none;border-radius:8px;cursor:pointer;transition:.3s;font-size:16px;}
.option:hover{background:#388E3C;transform:scale(1.02);}
.option:disabled{opacity:.7;cursor:not-allowed;}
.correct{background:#2E7D32!important;}
.wrong{background:#C62828!important;}
#result{margin-top:15px;font-weight:bold;}
#restart-btn{margin-top:20px;padding:12px 20px;border:none;background:#2E7D32;color:white;border-radius:8px;cursor:pointer;font-size:16px;display:none;}
#restart-btn:hover{background:#1B5E20;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media(min-width:600px){#options-container{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="main-wrapper">
<div id="quiz-container">
<h2>Protocolos de Red</h2>
<div id="progress-text"></div>
<div id="progress-bar"><div id="progress"></div></div>
<div id="question-container"></div>
<div id="options-container"></div>
<p id="result"></p>
<button id="restart-btn">Repetir Simulacro</button>
</div>
</div>
<script>
const questions = [
{question:"¿Qué significa la sigla TCP en protocolos de red?",options:["Transmission Control Protocol","Time Clock Protocol","Terminal Connection Protocol","Text Compression Protocol"],correctAnswer:0},
{question:"¿Cuál es la función principal del protocolo IP en una red?",options:["Control de tráfico","Enrutamiento de datos","Compresión de datos","Cifrado de datos"],correctAnswer:1},
{question:"¿Qué es una dirección MAC en redes de computadoras?",options:["Máscara de Acceso Controlado","Módulo de Acceso Central","Media Access Control","Modulación de Acceso a la Conexión"],correctAnswer:2},
{question:"¿Cuál es la diferencia entre TCP y UDP?",options:["TCP está orientado a la conexión, UDP no lo está","TCP es más rápido que UDP","UDP está orientado a la conexión, TCP no lo está","TCP y UDP son idénticos en funcionalidad"],correctAnswer:0},
{question:"¿Qué es un protocolo de enrutamiento en redes?",options:["Un protocolo para configurar enrutadores","Un protocolo para controlar el tráfico de datos","Un protocolo para enviar y recibir correos","Un protocolo para gestionar direcciones IP"],correctAnswer:0},
{question:"¿Cuál es la finalidad del protocolo DNS?",options:["Enrutamiento de paquetes","Resolución de nombres a direcciones IP","Control de calidad de servicio","Transferencia de archivos"],correctAnswer:1},
{question:"¿Qué es el protocolo DHCP y cuál es su función?",options:["Protocolo de Control Dinámico de Hosts, responsable de la seguridad de la red","Protocolo de Configuración Dinámica de Hosts, responsable de la asignación automática de direcciones IP","Protocolo de Enrutamiento Dinámico, responsable de la gestión de rutas en la red","Protocolo de Seguridad de Conexión Dinámica, responsable del cifrado de datos"],correctAnswer:1},
{question:"¿Qué es NAT en redes de computadoras?",options:["New Address Translation","Network Address Translation","Node Access Technology","National Authentication Token"],correctAnswer:1},
{question:"¿Qué es un firewall en términos de redes de computadoras?",options:["Un dispositivo para amplificar la señal de red","Una barrera física que protege los servidores","Un software o hardware que impide o permite el tráfico de datos","Una herramienta para monitorear el ancho de banda de la red"],correctAnswer:2},
{question:"¿Cuál es la función principal del protocolo ARP?",options:["Enrutamiento de paquetes","Resolución de direcciones IP a nombres","Resolución de direcciones MAC a direcciones IP","Control de congestión de red"],correctAnswer:2},
{question:"¿Qué es un protocolo de tunelización?",options:["Un protocolo para crear túneles en redes subterráneas","Un protocolo para encapsular un protocolo dentro de otro para transmisión a través de una red","Un protocolo para crear redes privadas virtuales","Un protocolo para aumentar el ancho de banda de la red"],correctAnswer:1},
{question:"¿Qué significa QoS en redes?",options:["Quality of Service","Quick Online Support","Quantum Operating System","Query of Standards"],correctAnswer:0},
{question:"¿Cuál es la diferencia entre un switch y un hub en una red local?",options:["Ambos son dispositivos idénticos","Un switch filtra el tráfico de red, mientras que un hub no lo hace","Un hub es más rápido que un switch","Un switch solo admite conexiones inalámbricas"],correctAnswer:1},
{question:"¿Qué es el protocolo ICMP y para qué se usa?",options:["Internet Control Message Protocol, usado para diagnóstico de red y reportes de error","Internet Communication Management Protocol, usado para gestionar comunicaciones en línea","Integrated Control and Monitoring Protocol, usado para control y monitoreo integrados","Internet Configuration and Management Protocol, usado para configurar dispositivos de red"],correctAnswer:0},
{question:"¿Qué es el protocolo FTP y cuál es su función?",options:["File Transfer Protocol, usado para transmisión de archivos","Fast Transmission Protocol, usado para transferencia rápida de datos","File Tracking Protocol, usado para rastrear cambios en archivos","File Type Protocol, usado para identificar el tipo de archivo"],correctAnswer:0},
{question:"¿Qué es el protocolo SSL/TLS y para qué sirve?",options:["Secure Socket Layer/Transport Layer Security, usado para cifrar comunicaciones en la web","Simple Service Locator/Transport Layer Security","System Security Layer/Transmission Level Security","Software Service Locator/Total Link Security"],correctAnswer:0},
{question:"¿Qué es una dirección IPv6 y por qué fue desarrollada?",options:["Una dirección de Internet versión 6 para reemplazar IPv4 debido a la escasez de direcciones","Para mejorar la velocidad de la conexión","Para redes privadas virtuales","Para admitir solo dispositivos inalámbricos"],correctAnswer:0},
{question:"¿Qué es un ataque DDoS en términos de redes?",options:["Directo y Descentralizado Sobrecargado","Distribución de Datos y Operaciones Seguras","Denegación de Servicio Distribuida","Duplicación de Sesiones y Operaciones Seguras"],correctAnswer:2},
{question:"¿Qué protocolo se usa para el envío de correos electrónicos?",options:["SMTP","FTP","DNS","ARP"],correctAnswer:0},
{question:"¿Qué protocolo se usa para recibir correos electrónicos en clientes de correo?",options:["POP3 o IMAP","HTTP","ICMP","DHCP"],correctAnswer:0}
];
let currentQuestion=0;let score=0;
function loadQuestion(){
const qc=document.getElementById("question-container");
const oc=document.getElementById("options-container");
const pt=document.getElementById("progress-text");
const p=document.getElementById("progress");
pt.textContent=`Pregunta ${currentQuestion+1} de ${questions.length}`;
p.style.width=`${((currentQuestion)/questions.length)*100}%`;
qc.textContent=questions[currentQuestion].question;
oc.innerHTML="";
questions[currentQuestion].options.forEach((option,index)=>{
const btn=document.createElement("button");
btn.textContent=option;btn.classList.add("option");btn.dataset.index=index;btn.onclick=selectOption;oc.appendChild(btn);
});
}
function selectOption(event){
const buttons=document.querySelectorAll(".option");
buttons.forEach(btn=>btn.disabled=true);
const selected=parseInt(event.target.dataset.index);
const correct=questions[currentQuestion].correctAnswer;
let delay;
if(selected===correct){event.target.classList.add("correct");document.getElementById("result").textContent="¡Correcto!";score++;delay=1000;}
else{event.target.classList.add("wrong");buttons[correct].classList.add("correct");document.getElementById("result").textContent=`Incorrecto. Respuesta correcta: ${questions[currentQuestion].options[correct]}`;delay=2000;}
currentQuestion++;
setTimeout(()=>{document.getElementById("result").textContent="";if(currentQuestion<questions.length){loadQuestion();}else{showResult();}},delay);
}
function showResult(){
document.getElementById("progress").style.width="100%";
document.getElementById("question-container").textContent="Resultado Final";
document.getElementById("options-container").innerHTML="";
document.getElementById("result").textContent=`¡Acertaste ${score} de ${questions.length} preguntas!`;
document.getElementById("restart-btn").style.display="inline-block";
}
document.getElementById("restart-btn").onclick=function(){currentQuestion=0;score=0;this.style.display="none";loadQuestion();};
loadQuestion();
</script>
</body>
</html>
