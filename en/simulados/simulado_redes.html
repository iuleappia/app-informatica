<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computer Networks</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;}
body{background:linear-gradient(135deg,#4CAF50,#2E7D32);min-height:100vh;display:flex;justify-content:center;align-items:center;}
#main-wrapper{width:95%;max-width:650px;}
#quiz-container{background:#fff;padding:25px;border-radius:16px;box-shadow:0 15px 40px rgba(0,0,0,0.2);text-align:center;animation:fadeIn .4s;}
h2{margin-bottom:10px;color:#2E7D32;}
#progress-text{margin-bottom:10px;font-size:14px;color:#555;}
#progress-bar{width:100%;height:10px;background:#ddd;border-radius:20px;overflow:hidden;margin-bottom:20px;}
#progress{height:100%;width:0%;background:#4CAF50;transition:.3s;}
#question-container{font-weight:bold;margin-bottom:20px;}
#options-container{display:grid;grid-template-columns:1fr;gap:10px;}
.option{width:100%;background:#4CAF50;color:#fff;padding:14px;border:none;border-radius:8px;cursor:pointer;transition:.3s;font-size:16px;}
.option:hover{background:#388E3C;transform:scale(1.02);}
.option:disabled{opacity:.7;cursor:not-allowed;}
.correct{background:#2E7D32!important;}
.wrong{background:#C62828!important;}
#result{margin-top:15px;font-weight:bold;}
#restart-btn{margin-top:20px;padding:12px 20px;border:none;background:#2E7D32;color:white;border-radius:8px;cursor:pointer;font-size:16px;display:none;}
#restart-btn:hover{background:#1B5E20;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media(min-width:600px){#options-container{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="main-wrapper">
<div id="quiz-container">
<h2>Computer Networks</h2>
<div id="progress-text"></div>
<div id="progress-bar"><div id="progress"></div></div>
<div id="question-container"></div>
<div id="options-container"></div>
<p id="result"></p>
<button id="restart-btn">Retake Quiz</button>
</div>
</div>
<script>
const questions = [
{question:"What is the function of the TCP protocol?",options:["Transfer files","Send emails","Reliably transfer data","Browse the web"],correctAnswer:2},
{question:"What does the acronym IP stand for?",options:["Internet Protocol","Internal Protocol","Intranet Port","Internet Port"],correctAnswer:0},
{question:"What is the purpose of DNS in a network?",options:["Assign IP addresses","Translate domain names into IP addresses","Forward data packets","Encrypt data"],correctAnswer:1},
{question:"What is a firewall?",options:["Antivirus software","A device or software to block unauthorized traffic","A communication protocol","Network management software"],correctAnswer:1},
{question:"What is the function of a router in a network?",options:["Connect devices on the same subnet","Forward packets between different networks","Filter email spam","Manage file servers"],correctAnswer:1},
{question:"What is a MAC address?",options:["A static IP address","A unique identifier for network devices","A communication protocol","A type of firewall"],correctAnswer:1},
{question:"What does the acronym LAN stand for?",options:["Local Area Network","Long-range Area Network","Large Array Network","Low-latency Access Network"],correctAnswer:0},
{question:"What is a DDoS (Distributed Denial of Service) attack?",options:["An attack that tries to steal confidential information","An attack that overwhelms a system making it inaccessible","A computer virus attack","An attack that modifies data in transit"],correctAnswer:1},
{question:"What is the difference between IPv4 and IPv6?",options:["IPv4 uses 32-bit addresses, while IPv6 uses 128-bit addresses","IPv4 is newer than IPv6","IPv4 is more secure than IPv6","IPv4 does not support wireless communication"],correctAnswer:0},
{question:"What is a proxy?",options:["A type of firewall","A server that forwards requests between client and server","A security protocol","A type of computer virus"],correctAnswer:1},
{question:"What is the function of the ICMP protocol?",options:["Forward packets between networks","Check the availability of a host on the network","Encrypt communications","Dynamically assign IP addresses"],correctAnswer:1},
{question:"What is NAT (Network Address Translation)?",options:["A security protocol","A type of IP address","A method for mapping private IP addresses to a single public IP address","A type of network cable"],correctAnswer:2},
{question:"What is a routing protocol?",options:["A protocol for file transfer","A set of rules for secure communication","A protocol for forwarding packets between networks","An encryption protocol"],correctAnswer:2},
{question:"What is SSL/TLS?",options:["A protocol for file transfer","A security protocol for web communication","A type of IP address","A firewall protocol"],correctAnswer:1},
{question:"What is the main function of a switch in a network?",options:["Forward packets between networks","Connect devices on the same subnet","Control internet access","Block unauthorized traffic"],correctAnswer:1},
{question:"What is a phishing attack?",options:["An attack that tries to overload a system","An attack that steals confidential information by deceiving the user","A type of firewall","An encryption protocol"],correctAnswer:1},
{question:"What is a private IP address?",options:["An IP address assigned to a web server","An IP address that cannot be accessed from the internet","An IP address assigned to a mobile device","A static IP address"],correctAnswer:1},
{question:"What is the difference between UDP and TCP?",options:["UDP is more secure than TCP","TCP is connection-oriented, while UDP is not","UDP is used only for file transfers","TCP is not suitable for large-scale networks"],correctAnswer:1},
{question:"What is a VLAN?",options:["A type of IP address","A security protocol","A virtual local area network that segments a physical network into logical networks","A type of network cable"],correctAnswer:2},
{question:"What is a gateway?",options:["A device that connects different networks","A type of security protocol","A type of computer virus","An encryption protocol"],correctAnswer:0}
];
let currentQuestion=0;let score=0;
function loadQuestion(){
const qc=document.getElementById("question-container");
const oc=document.getElementById("options-container");
const pt=document.getElementById("progress-text");
const p=document.getElementById("progress");
pt.textContent=`Question ${currentQuestion+1} of ${questions.length}`;
p.style.width=`${((currentQuestion)/questions.length)*100}%`;
qc.textContent=questions[currentQuestion].question;
oc.innerHTML="";
questions[currentQuestion].options.forEach((option,index)=>{
const btn=document.createElement("button");
btn.textContent=option;btn.classList.add("option");btn.dataset.index=index;btn.onclick=selectOption;oc.appendChild(btn);
});
}
function selectOption(event){
const buttons=document.querySelectorAll(".option");
buttons.forEach(btn=>btn.disabled=true);
const selected=parseInt(event.target.dataset.index);
const correct=questions[currentQuestion].correctAnswer;
let delay;
if(selected===correct){event.target.classList.add("correct");document.getElementById("result").textContent="Correct!";score++;delay=1000;}
else{event.target.classList.add("wrong");buttons[correct].classList.add("correct");document.getElementById("result").textContent=`Incorrect. Correct answer: ${questions[currentQuestion].options[correct]}`;delay=2000;}
currentQuestion++;
setTimeout(()=>{document.getElementById("result").textContent="";if(currentQuestion<questions.length){loadQuestion();}else{showResult();}},delay);
}
function showResult(){
document.getElementById("progress").style.width="100%";
document.getElementById("question-container").textContent="Final Result";
document.getElementById("options-container").innerHTML="";
document.getElementById("result").textContent=`You got ${score} out of ${questions.length} questions right!`;
document.getElementById("restart-btn").style.display="inline-block";
}
document.getElementById("restart-btn").onclick=function(){currentQuestion=0;score=0;this.style.display="none";loadQuestion();};
loadQuestion();
</script>
</body>
</html>
